name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -tags sqlite_fts5 ./...

      # goreleaser-cross bundles cgo cross toolchains (linux, windows
      # via mingw, darwin via osxcross) so mattn/go-sqlite3 builds for
      # every target. Pinned to a specific tag.
      - name: Run GoReleaser (cross)
        run: |
          docker run --rm --privileged \
            -v "${PWD}:/src" \
            -w /src \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            ghcr.io/goreleaser/goreleaser-cross:v1.26 \
            release --clean
