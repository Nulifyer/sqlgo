name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -tags sqlite_fts5 ./...

      - name: Free release disk space
        run: |
          df -h /
          sudo rm -rf \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /usr/share/swift \
            /opt/ghc \
            /usr/local/.ghcup
          df -h /

      # goreleaser-cross bundles cgo cross toolchains (linux, windows
      # via mingw, darwin via osxcross) so mattn/go-sqlite3 builds for
      # every target. Pinned to a specific tag.
      - name: Run GoReleaser (cross)
        run: |
          mkdir -p "${HOME}/go/pkg/mod" "${HOME}/.cache/go-build"
          docker run --rm --privileged \
            --user "$(id -u):$(id -g)" \
            --entrypoint goreleaser \
            -v "${PWD}:/src" \
            -v "${HOME}/go/pkg/mod:/tmp/gomodcache" \
            -v "${HOME}/.cache/go-build:/tmp/gobuildcache" \
            -w /src \
            -e HOME=/tmp \
            -e GOMODCACHE=/tmp/gomodcache \
            -e GOCACHE=/tmp/gobuildcache \
            -e GOMAXPROCS=2 \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            ghcr.io/goreleaser/goreleaser-cross:v1.26 \
            release --clean --parallelism=5
